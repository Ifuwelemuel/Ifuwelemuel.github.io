  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk: 'https://github.com/Ifuwelemuel', active: false, shipped: true,\n          desc: 'Collaborative filtering recommender via matrix factorisation in TensorFlow serving 1,000+ users. BERT NLP tagging pipeline, 40% model compression via quantisation. Dockerised FastAPI on AWS ECS Fargate with CI/CD.',\n          tags: ['TensorFlow','BERT','FastAPI','Docker','AWS ECS','Redis','GitHub Actions','MLflow'] },\n        { title: 'Churn Predictor — Trinity Links', link: 'https://github.com/Ifuwelemuel', active: false, shipped: true,\n          desc: 'Predictive churn model on billing and network usage data, 80%+ accuracy. RFM feature engineering alongside network telemetry. Live Looker Studio dashboard for real-time account flagging. 20% estimated attrition reduction.',\n          tags: ['Python','Scikit-learn','SQL','Pandas','RFM','NumPy','Looker Studio'] },\n        { title: 'SO-ARM101 VLA Fine-tuning', link: 'https://github.com/Ifuwelemuel', active: true, shipped: false,\n          desc: 'Debug Tech flagship: fine-tuning OpenVLA on custom SO-ARM101 Pro demonstration data. Community-driven Vision-Language-Action model for physical AI tasks targeting defence, construction, and industrial verticals.',\n          tags: ['PyTorch','OpenVLA','Hugging Face','ROS2','CUDA','Jetson Orin','LeRobot'] },\n        { title: 'Huawei Decommission Pipeline', link: 'https://github.com/Ifuwelemuel', active: false, shipped: true,\n          desc: 'Python automation pipeline for large-scale network decommission analysis. Statistical anomaly detection reducing false positive rates by 30%, boosting delivery efficiency by 45%. Continuous data drift monitoring.',\n          tags: ['Python','Pandas','NumPy','SQL','Anomaly Detection','ETL','Feature Engineering'] }\n      ],\n      experience: [\n        { date: '2025 — present', title: 'AI Research Assistant', org: 'Sheffield Hallam University',\n          tags: ['PyTorch','Transformers','ROS2','MESA dataset','CUDA'] },\n        { date: 'Jan — Aug 2025', title: 'Data Scientist', org: 'Royal Iwere Foundation (RIF)',\n          tags: ['LLM fine-tuning','Power BI','ETL','SQL','Sentiment Analysis'] },\n        { date: 'Nov 2023 — Oct 2024', title: 'System Integration Consultant', org: 'Huawei Technologies Nigeria',\n          tags: ['Python','Anomaly Detection','Statistical Modelling','ETL'] },\n        { date: 'May 2023 — Jan 2024', title: 'ML Engineer & Co-Founder', org: 'Electronit AI',\n          tags: ['TensorFlow','BERT','AWS','Docker','FastAPI','CI/CD'] }\n      ],\n      stack: [\n        { label: 'ML & Deep Learning', vals: 'PyTorch, TensorFlow, Scikit-learn, CNNs, TCNs, LSTM, Transformers, XGBoost, Hugging Face, BERT, OpenCV' },\n        { label: 'NLP & Speech AI', vals: 'Whisper, Wav2Vec2, BERT fine-tuning, RAG pipelines, LLM APIs (Claude, GPT-4o), Semantic Embeddings' },\n        { label: 'MLOps & Deployment', vals: 'Docker, FastAPI, MLflow, DVC, GitHub Actions, AWS (ECS Fargate, Lambda, SageMaker), Redis' },\n        { label: 'Robotics & Embedded', vals: 'ROS2 Humble, Gazebo, MAVROS, ArduSub, Pixhawk, NVIDIA Jetson Orin Nano, CUDA, JetPack 6' },\n        { label: 'Data Engineering', vals: 'SQL, Pandas, NumPy, Power BI, Looker Studio, ETL pipelines, SHAP, Apache Airflow' },\n        { label: 'Languages', vals: 'Python, C/C++, MATLAB, Bash, RAPID (ABB RobotStudio)' },\n        { label: 'Foundations', vals: 'Control systems theory, signal processing, embedded systems design, linear algebra, calculus' }\n      ]\n    };\n  }\n\n  componentDidMount() {\n    // Scroll reveal\n    try {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.08 });\n      document.querySelectorAll('[data-fade]').forEach((el) => io.observe(el));\n    } catch (err) {\n      document.querySelectorAll('[data-fade]').forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    }\n\n    // Section indicator (scroll spy)\n    const rail = document.getElementById('section-rail');\n    if (rail) {\n      const items = Array.from(rail.querySelectorAll('a[data-spy]'));\n      const setActive = (id) => {\n        items.forEach((it) => {\n          const on = it.dataset.spy === id;\n          const tick = it.querySelector('[data-tick]');\n          const label = it.querySelector('[data-label]');\n          it.dataset.active = on ? '1' : '0';\n          tick.style.width = on ? '30px' : '16px';\n          tick.style.background = on ? '#14130f' : '#cdcabf';\n          label.style.opacity = on ? '1' : '0';\n          label.style.color = on ? '#14130f' : '#9b988f';\n        });\n      };\n      items.forEach((it) => {\n        const tick = it.querySelector('[data-tick]');\n        const label = it.querySelector('[data-label]');\n        it.addEventListener('mouseenter', () => {\n          if (it.dataset.active !== '1') { label.style.opacity = '.6'; tick.style.background = '#9b988f'; }\n        });\n        it.addEventListener('mouseleave', () => {\n          if (it.dataset.active !== '1') { label.style.opacity = '0'; tick.style.background = '#cdcabf'; }\n        });\n      });\n      const ids = ['top','projects','showcase','experience','debug-tech','stack','contact'];\n      const secs = ids.map((id) => document.getElementById(id)).filter(Boolean);\n      const spy = new IntersectionObserver((entries) => {\n        entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });\n      }, { rootMargin: '-45% 0px -45% 0px', threshold: 0 });\n      secs.forEach((s) => spy.observe(s));\n      setActive('top');\n    }\n\n    // Showcase carousel\n    const track = document.getElementById('sc-track');\n    const prev = document.getElementById('sc-prev');\n    const next = document.getElementById('sc-next');\n    if (!track || !prev || !next) return;\n    const dots = document.querySelectorAll('#sc-dots button');\n    const items = track.querySelectorAll(':scope > div');\n    let cur = 0;\n    const vis = () => (window.innerWidth <= 900 ? 1 : 3);\n    const total = () => Math.ceil(items.length / vis());\n    const go = (idx) => {\n      const t = total();\n      cur = Math.max(0, Math.min(t - 1, idx));\n      const w = track.parentElement.offsetWidth;\n      const v = vis();\n      const iw = (w - (v - 1) * 22) / v;\n      track.style.transform = 'translateX(-' + (cur * v * (iw + 22)) + 'px)';\n      dots.forEach((d, i) => {\n        const on = i === cur;\n        d.style.background = on ? '#14130f' : '#dad7ce';\n        d.style.width = on ? '20px' : '7px';\n        d.style.borderRadius = on ? '4px' : '50%';\n      });\n    };\n    prev.addEventListener('click', () => go(cur - 1));\n    next.addEventListener('click', () => go(cur + 1));\n    dots.forEach((d) => d.addEventListener('click', () => go(+d.dataset.idx)));\n    window.addEventListener('resize', () => go(cur));\n    go(0);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
